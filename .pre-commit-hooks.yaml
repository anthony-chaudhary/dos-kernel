# DOS pre-commit hooks (docs/304) — the claim-vs-diff gate, fired locally so an
# unwitnessed claim is caught before the push publishes it.
#
# Consumers add this to their .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/anthony-chaudhary/dos-kernel
#       rev: v0.26.0
#       hooks:
#         - id: dos-commit-audit        # block a push carrying an unwitnessed claim
#
# then install the stages these hooks run at (they are NOT the default stage):
#
#   pre-commit install --hook-type pre-push --hook-type post-commit
#
# These are TOOLING that consumes the package (the `dos` CLI this repo installs);
# nothing under src/dos/ imports them. The verdict IS the exit code, so
# pre-commit's pass/fail is the kernel's verdict with no glue beyond the range
# adapter (dos.drivers.pre_commit — pre-commit hands the pushed range to the
# hook as env vars, and an `entry:` line gets no shell expansion).
#
# Stage note (the docs/304 fix): git's pre-commit stage runs BEFORE the commit
# object exists — HEAD there is the PARENT of the commit being made, so a
# commit-audit hook at that stage judges the wrong commit, off by one. The only
# stages where the commit being judged exists are post-commit (advisory; cannot
# block) and pre-push (gating). These hooks use exactly those two.
#
# Scope note: `commit-audit` grades whether a diff did the KIND of thing its
# message CLAIMED — claim-witnessing, NOT correctness (Wall 3, docs/204 §3).
# Keep your test/lint hooks too; this sits beside them. It abstains (never
# blocks) on a wip/merge commit or a subject with no checkable claim.

- id: dos-commit-audit
  name: "DOS: a pushed commit's claim must be backed by its diff"
  description: "Block a push containing a commit whose subject claims work its diff does not witness (author-neutral, deterministic; abstains where it can't ground a verdict)."
  entry: python -m dos.drivers.pre_commit
  language: python
  # A whole-commit verdict, not a per-file linter — and always_run is
  # load-bearing: the forgery this gate exists for (`git commit --allow-empty
  # -m "implement the cache"`) changes ZERO files, and a hook with no matching
  # files is otherwise skipped on exactly the commit it was built to catch.
  pass_filenames: false
  always_run: true
  stages: [pre-push]
  minimum_pre_commit_version: "3.2.0"

- id: dos-commit-audit-warn
  name: "DOS: claim-vs-diff (observe-only — warns, never blocks)"
  description: "The advisory floor: report an unwitnessed claim right after each commit but always exit 0. For teams that want the signal in the log without a hard gate yet."
  entry: python -m dos.drivers.pre_commit --warn-only
  language: python
  pass_filenames: false
  # post-commit passes no filenames, so always_run is required for the hook to
  # fire at all; verbose is required for a passing (exit-0) hook's report to be
  # shown — without it a warn-only hook is silent forever.
  always_run: true
  verbose: true
  stages: [post-commit]
  minimum_pre_commit_version: "3.2.0"

# The BINDING diff turnstile (docs/126 Phase 1) — DOS's first enforcement point,
# fired at the pre-commit stage over the STAGED footprint (`dos apply --staged`
# reads `git diff --cached`, which exists at that stage — unlike commit-audit,
# which needs the commit object and is off-by-one there, the docs/304 fix above).
# Where dos-commit-audit WITNESSES a claim after the fact, this PREVENTS a write
# that escapes the lane the agent leased — or collides with a sibling's live
# lease — from being committed at all. The verdict IS the exit code: exit 1 fails
# the commit.
#
# OPT-IN, and deliberately so: the gate needs to know which lane this run holds.
# Inside a leased dispatch loop it auto-resolves from the WAL (run-id / loop-ts /
# pid). For an interactive commit, pin the lane in your .pre-commit-config.yaml:
#
#   - id: dos-apply
#     args: ["--lane", "src"]     # the lane THIS checkout is working in
#
# With no resolvable lease and no --lane it fails CLOSED (refuses a non-empty
# diff — an unknown blast radius). `dos apply --force` is the operator's sole,
# audited override (the agent cannot force its own gate). Install the stage:
#
#   pre-commit install --hook-type pre-commit
- id: dos-apply
  name: "DOS: a staged write must stay inside the lane this run holds"
  description: "Refuse to commit a staged diff that escapes the held lane's tree or collides with a live sibling lease (docs/126 Phase 1, the binding turnstile). Fails closed on an unresolvable lane; `dos apply --force` is the operator's audited override."
  entry: dos apply --staged
  language: python
  pass_filenames: false
  always_run: true
  stages: [pre-commit]
  minimum_pre_commit_version: "3.2.0"
