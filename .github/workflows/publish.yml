name: Publish to PyPI

# (This file shipped in the repo's initial commit, which GitHub's workflow
# indexer can miss — this comment exists from the touch-commit that registered it.)
#
# Publishes `dos-kernel` to PyPI via **Trusted Publishing (OIDC)** — no stored
# API token. GitHub mints a short-lived OIDC token, PyPI exchanges it for an
# upload token that expires in ~15 minutes, and `pypa/gh-action-pypi-publish`
# does the upload. This is the recommended 2026 path (docs.pypi.org/trusted-publishers).
#
# WHY a separate workflow from ci.yml: ci.yml proves the wheel BUILDS + passes
# `twine check` on every push (a gate). THIS workflow takes the one-way,
# outward-facing step — it uploads — and so it is deliberately gated on (a) a
# version tag and (b) a protected GitHub Environment, never on a plain push.
#
# ── ONE-TIME OWNER SETUP (web, before the first run) ────────────────────────────
# A trusted publisher is a record on PyPI that says "this repo + this workflow
# file + this environment may upload this project, tokenlessly." You configure it
# once on the web; nothing here works until you do.
#
#   1. PyPI  → https://pypi.org/manage/account/publishing/  (Add a pending publisher)
#        PyPI Project Name : dos-kernel
#        Owner             : anthony-chaudhary
#        Repository        : dos-kernel        (the PUBLIC repo name)
#        Workflow name     : publish.yml
#        Environment       : pypi
#      (A "pending" publisher reserves the name on first publish; after the first
#       upload it becomes a normal trusted publisher. This is how the reserved
#       `dos-kernel` name is claimed — see SECURITY.md "Supply chain".)
#
#   2. TestPyPI → https://test.pypi.org/manage/account/publishing/  (same fields,
#        Environment: testpypi) — only if you want the dry-run leg below.
#
#   3. GitHub → repo Settings → Environments → create `pypi` (and `testpypi`).
#        Add "Required reviewers" (yourself) to `pypi` so a human approves each
#        real upload — the protected gate that makes the one-way step deliberate.
#
# ── HOW TO RELEASE ──────────────────────────────────────────────────────────────
#   * Real publish:  push a `v*` tag (what `/release` already does), OR run this
#     workflow manually (Actions → Publish to PyPI → Run workflow) with
#     target=pypi. THREE gates stand before the upload: the `ci-green` job refuses
#     any SHA without a green CI run on it (it polls while CI finishes); the
#     TestPyPI REHEARSAL (docs/295 P4) auto-uploads the same artifacts to TestPyPI
#     and install-smokes them back out on a clean runner (soft gate: an upload
#     outage ABSTAINS and proceeds, a failed install smoke is a real defect and
#     refuses); then the `pypi` environment's required-reviewer gate pauses for
#     your approval with all three verdicts visible.
#   * Manual rehearsal only: run with target=testpypi — uploads to TestPyPI,
#     validating the entire OIDC path without touching real PyPI (skip-existing is
#     on, so repeat rehearsals of the same version no-op).
#   * The testpypi trusted publisher (setup step 2) is what lets the rehearsal
#     upload; without it the rehearsal ABSTAINS on every tag — releases still
#     work, you just lose the registry read-back.

on:
  # A version tag is the trigger for a real release — the same `vX.Y.Z` tag
  # `/release` pushes. (Tag pushes don't carry a branch, so this never fires on a
  # normal commit.)
  push:
    tags: ["v*"]
  # Manual runs let you pick TestPyPI (dry-run) vs PyPI without cutting a tag.
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

concurrency:
  # Never run two publishes of the same ref at once (a double-upload is a hard
  # error on PyPI, but failing fast here is cleaner). Do NOT cancel-in-progress —
  # an upload mid-flight should finish, not be killed.
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Build once, validate, hand the artifacts downstream ─────────────────────
  # The artifact built HERE is the exact artifact uploaded below — build-once,
  # publish-the-same-bytes (never rebuild between check and upload).
  build:
    name: build & check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      # The native dos-hook fast-path binary (docs/125/286) is a STATIC, no-cgo Go
      # executable, so ONE runner cross-compiles every arch (CGO_ENABLED=0 means no
      # glibc link — the manylinux2014 tag is honest from any builder). scripts/
      # build_wheels.py drives the per-arch loop.
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: go/go.sum

      - name: Build per-platform wheels (+ sdist) and validate metadata
        run: |
          python -m pip install --upgrade pip build twine wheel
          # One wheel per OS/arch, each embedding only its matching dos-hook binary at
          # dos/_bin/, re-tagged py3-none-any -> py3-none-<platform> so pip selects the
          # one wheel that matches the installing machine (docs/286). The sdist is built
          # pure-source (no binary; falls through to the Python verb on install).
          python scripts/build_wheels.py
          # `twine check` is the cheap pre-flight: it fails if the long-description
          # (README) won't render on PyPI, or a classifier is malformed. The same gate
          # ci.yml runs; repeated here (over EVERY per-platform wheel + the sdist) so a
          # publish can't outrun it.
          python -m twine check dist/*

      - name: Read the built version (and assert tag agreement)
        id: version
        shell: bash
        run: |
          # Read from pyproject.toml (the version's source of truth) — the package
          # itself is NOT installed in this job; only build/twine/wheel are.
          v="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Built dos-kernel $v"
          # On a tag push, the tag (vX.Y.Z) MUST match the package version — a
          # mismatch means the version markers weren't bumped (the scar /release's
          # bumper guards against). Fail loudly rather than ship a mislabelled wheel.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME#v}"
            if [ "$tag" != "$v" ]; then
              echo "::error::tag $GITHUB_REF_NAME disagrees with package version $v — bump the version markers (see /release) before tagging."
              exit 1
            fi
          fi

      - name: Upload the distribution for the publish jobs
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  # ── 1b. The CI witness gate ─────────────────────────────────────────────────────
  # This workflow runs NO tests of its own — it trusts ci.yml. But ci.yml cancels
  # superseded master runs (cancel-in-progress), so a tagged commit can exist whose
  # CI run was cancelled, red, or never fired. Don't BELIEVE the tag implies a green
  # suite — go read the verdict: poll for a CI run on this exact SHA and refuse to
  # publish without a `success`. (The same move the kernel makes everywhere: the
  # claim is forgeable, the witness — a completed run on these bytes — is not.)
  # The common /release flow pushes master + tag together, so CI is usually still
  # running when this fires; the poll absorbs that, bounded by the job timeout.
  ci-green:
    name: require a green CI run on the candidate
    # Gate only what publishes: same guard as publish-pypi below, so a dry-run or
    # a tag in the private archive never burns a runner polling.
    if: >-
      github.repository == 'anthony-chaudhary/dos-kernel' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read   # gh run list needs to read this repo's run history
    steps:
      # For an ANNOTATED tag push (what /release cuts), github.sha is the tag
      # OBJECT's SHA, not the commit's (the actions/checkout#290 gotcha) — and CI
      # runs are keyed by commit. Check the ref out and dereference to the commit.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Wait for the CI verdict on the candidate commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          echo "candidate: $sha (ref ${GITHUB_REF}, event sha ${GITHUB_SHA})"
          start=$SECONDS
          while :; do
            runs="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow ci.yml \
                      --commit "$sha" --json status,conclusion,databaseId)"
            success="$(jq '[.[] | select(.conclusion == "success")] | length' <<<"$runs")"
            pending="$(jq '[.[] | select(.status != "completed")] | length' <<<"$runs")"
            total="$(jq 'length' <<<"$runs")"
            if [ "$success" -gt 0 ]; then
              echo "CI is green on $sha — publish may proceed."
              exit 0
            fi
            if [ "$pending" -gt 0 ]; then
              echo "CI still running on $sha ($pending in flight) — waiting…"
            elif [ "$total" -eq 0 ] && [ $((SECONDS - start)) -lt 180 ]; then
              # The tag and the branch push arrive together; give the push
              # webhook a moment to register its run before calling it absent.
              echo "no CI run registered yet for $sha — waiting for the push webhook…"
            elif [ "$total" -eq 0 ]; then
              echo "::error::no CI run exists for $sha — it was never pushed to master (or CI never fired). Get a green run on this exact commit first (push it, or Actions → CI → Run workflow), then re-run this publish."
              exit 1
            else
              echo "::error::CI on $sha completed without a success — a cancelled or failed run is not a verdict. Re-run it to green (gh run rerun <id>), then re-run this publish."
              gh run list --repo "$GITHUB_REPOSITORY" --workflow ci.yml --commit "$sha"
              exit 1
            fi
            sleep 30
          done

  # ── 2a. Rehearsal leg → TestPyPI (docs/295 P4) ─────────────────────────────────
  # Fires AUTOMATICALLY on every `v*` tag push — before the `pypi` approval hold —
  # and on a manual dispatch with target=testpypi. ci-green witnesses the TREE;
  # this leg witnesses the PUBLISH: the same artifact set accepted by a real
  # registry index, then installed back out of it on a clean runner (the smoke job
  # below). Soft-gated in the docs/86 fail-to-abstain discipline: an upload
  # failure here (TestPyPI outage / quota / a missing testpypi trusted publisher)
  # marks the rehearsal ABSTAINED and the pypi leg still proceeds to its approval
  # hold with that fact in the summary — but a SMOKE failure (uploaded fine,
  # installs broken) is a real artifact defect and blocks the hold.
  publish-testpypi:
    name: rehearse → TestPyPI
    needs: build
    # Repo guard: `/release` tags the PRIVATE archive too, and this workflow ships
    # in the seed — but the trusted publisher is bound to the public repo, so a
    # run anywhere else could only fail noisily at upload. Skip it there entirely.
    if: >-
      github.repository == 'anthony-chaudhary/dos-kernel' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/project/dos-kernel/
    permissions:
      id-token: write   # the OIDC token mint — REQUIRED for trusted publishing
    outputs:
      # 'success' iff the upload step actually uploaded — the smoke job's
      # admission condition, and the pypi leg's ABSTAIN-vs-defect discriminator.
      uploaded: ${{ steps.upload.outcome }}
    steps:
      - name: Download the built distribution
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Publish to TestPyPI
        id: upload
        # Soft gate: a raise here must not fail the rehearsal job — the verdict
        # split (ABSTAINED vs defect) is carried by `outputs.uploaded` + the
        # smoke job, not by this job's color.
        continue-on-error: true
        # SHA-pinned (= release/v1 at pin time): this is the credential-bearing
        # upload step, so it gets a full-SHA pin rather than a movable tag.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/
          # TestPyPI is noisy with leftover versions; don't fail a rehearsal just
          # because a file already exists there.
          skip-existing: true
      - name: Report the rehearsal verdict
        shell: bash
        run: |
          if [ "${{ steps.upload.outcome }}" = "success" ]; then
            echo "rehearsal: TestPyPI accepted the artifacts — install smoke runs next." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::TestPyPI rehearsal ABSTAINED — the upload did not complete (outage / quota / publisher config). The PyPI leg still proceeds to its approval hold; weigh this when approving."
            echo "rehearsal: ABSTAINED (upload failed — see the upload step log; the pypi hold is NOT blocked)" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── 2a′. The rehearsal's read-back — install smoke (docs/295 P4) ────────────────
  # Installs the just-rehearsed version back OUT of TestPyPI on a clean runner and
  # imports it — the env-authored read-back of the publish claim. Runs only when
  # the rehearsal upload actually succeeded, so a failure HERE is never an outage:
  # it is a real artifact defect (uninstallable wheel, broken import, version
  # mismatch) and it blocks the pypi hold below.
  rehearsal-smoke:
    name: rehearsal install smoke
    needs: [build, publish-testpypi]
    if: >-
      !cancelled() &&
      needs.publish-testpypi.outputs.uploaded == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install from TestPyPI and import
        shell: bash
        run: |
          set -euo pipefail
          v="${{ needs.build.outputs.version }}"
          # --extra-index-url points at real PyPI because TestPyPI does not
          # mirror dependencies — without it the install fails on PyYAML, a
          # false red. The pin is exact, so the dos-kernel bytes themselves can
          # only come from the rehearsal upload (real PyPI does not have $v yet).
          # The index can lag the upload by a moment; bounded retries absorb it.
          for i in 1 2 3 4 5; do
            if python -m pip install --index-url https://test.pypi.org/simple/ \
                 --extra-index-url https://pypi.org/simple/ "dos-kernel==$v"; then
              break
            fi
            if [ "$i" = 5 ]; then
              echo "::error::dos-kernel==$v never became installable from TestPyPI — the upload claimed success but the read-back failed."
              exit 1
            fi
            echo "index not serving dos-kernel==$v yet — retry $i/5 in 45s"
            sleep 45
          done
          got="$(python -c 'import dos; print(dos.__version__)')"
          echo "imported dos $got from the TestPyPI artifact"
          if [ "$got" != "$v" ]; then
            echo "::error::installed version $got != built $v"
            exit 1
          fi
          dos doctor
          echo "rehearsal smoke: dos-kernel==$v installs, imports, and answers doctor from a clean runner" >> "$GITHUB_STEP_SUMMARY"

  # ── 2b. Real publish → PyPI ───────────────────────────────────────────────────
  # Runs on a `v*` tag push, OR a manual dispatch with target=pypi. The `pypi`
  # environment's required-reviewer gate (one-time setup above) pauses here for
  # human approval — the deliberate hand on the one-way step.
  publish-pypi:
    name: publish → PyPI
    # ci-green is a hard prerequisite: the artifact may be perfect, but without a
    # green CI run on this exact SHA there is no witnessed suite verdict for the
    # bytes being published. The rehearsal pair gates SOFTLY (docs/295 P4): a
    # skipped smoke (upload abstained / manual pypi dispatch) proceeds, a FAILED
    # smoke (real install defect) refuses. (All gates resolve BEFORE the
    # environment's required-reviewer pause, so the approver sees their verdicts
    # when deciding.)
    needs: [build, ci-green, publish-testpypi, rehearsal-smoke]
    # Same repo guard as the rehearsal leg: a `v*` tag pushed in the private
    # archive must not even attempt a publish from there. `!cancelled()` (not a
    # bare default) is what lets this job evaluate at all when the rehearsal
    # legs were skipped — the explicit result conditions then decide.
    if: >-
      !cancelled() &&
      github.repository == 'anthony-chaudhary/dos-kernel' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')) &&
      needs.build.result == 'success' &&
      needs.ci-green.result == 'success' &&
      needs.rehearsal-smoke.result != 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/dos-kernel/
    permissions:
      id-token: write   # the OIDC token mint — REQUIRED for trusted publishing
    steps:
      - name: Download the built distribution
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        # SHA-pinned (= release/v1 at pin time): this is the credential-bearing
        # upload step, so it gets a full-SHA pin rather than a movable tag.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        # No `password:` — Trusted Publishing supplies the credential via OIDC.
        # No `skip-existing` — a re-upload of an existing version on REAL PyPI
        # should fail loudly (you forgot to bump), not be silently skipped.
