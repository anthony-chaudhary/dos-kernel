  <title>DOS — the caught lie, recorded from the real CLI</title>
  <desc>A terminal recording of the caught lie. The agent reports: "Done! Shipped the login endpoint (AUTH1) and the password reset (AUTH2)." git log shows one commit — ee8f8e6 AUTH1: ship the login endpoint. dos verify AUTH AUTH1 answers SHIPPED AUTH AUTH1 ee8f8e6 (via grep-subject), exit 0. dos verify AUTH AUTH2 answers NOT_SHIPPED AUTH AUTH2 (via none), exit 1 — caught. The exit code is the verdict: gate the agent's done on it and a false claim cannot land.</desc>

  <!-- GENERATED FILE — do not edit by hand. Recorded by
       scripts/build_caught_lie_cast.py driving the real `dos` CLI;
       tests/test_caught_lie_cast.py pins these bytes to a fresh
       re-recording. To change the cast, change the script and re-run it. -->

  <style>

